<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка Z-City</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f1216;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        
        /* Фон с твоей картинкой */
        .bg {
            background-image: url('background.jpeg'); /* Имя твоей картинки */
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 100%;
            position: absolute;
            z-index: 1;
            /* Легкое размытие для красоты, если хочешь - удали эту строчку */
            filter: blur(4px) brightness(0.7); 
            transform: scale(1.05); /* Убираем белые края от размытия */
        }

        /* Темная накладка поверх картинки и контент */
        .content {
            position: absolute;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            background: rgba(0, 0, 0, 0.4);
        }

        /* Красивый крутящийся спиннер загрузки */
        .loader {
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #00e6ff; /* Цвет Z-City */
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 230, 255, 0.5);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }
        
        p {
            font-size: 1.5rem;
            color: #b4b4bc;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="content">
        <div class="loader"></div>
        <h1>ДОБРО ПОЖАЛОВАТЬ</h1>
        <p>Загрузка игровых данных...</p>
    </div>

    <!-- Невидимый плеер с музыкой -->
    <audio id="bg-music" src="Music.mp3" autoplay loop></audio>

    <script>
        var audio = document.getElementById("bg-music");
        audio.volume = 0.15; // Громкость 15%
        
        audio.play().catch(function(error) {
            console.log("Автоплей заблокирован браузером, ждем загрузки движка");
        });
    </script>
</body>
</html>
